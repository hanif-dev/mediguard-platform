# ─── Production Profile (PostgreSQL) ──────────────────
# Activate with: java -jar mediguard.jar --spring.profiles.active=prod
# Or: SPRING_PROFILES_ACTIVE=prod

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mediguarddb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:mediguard}
spring.datasource.password=${DB_PASSWORD:change_in_production}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

mediguard.jwt.secret=${JWT_SECRET:change_this_secret_in_production_min_256_bits}
mediguard.cors.allowed-origins=${CORS_ORIGINS:https://mediguard.example.de}
