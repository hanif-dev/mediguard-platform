# ─── Application ───────────────────────────────────────
spring.application.name=MediGuard Deutschland
server.port=8080

# ─── H2 In-Memory Database (Development) ───────────────
spring.datasource.url=jdbc:h2:mem:mediguarddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=mediguard
spring.datasource.password=mediguard123
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ───────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ─── JWT ───────────────────────────────────────────────
mediguard.jwt.secret=MediGuardDeutschlandSecretKey2024-DSGVO-Compliant-Production-Change-This!
mediguard.jwt.expiration=86400000

# ─── OpenAPI / Swagger ─────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Logging ───────────────────────────────────────────
logging.level.de.mediguard=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# ─── CORS ──────────────────────────────────────────────
mediguard.cors.allowed-origins=http://localhost:5173,http://localhost:3000
