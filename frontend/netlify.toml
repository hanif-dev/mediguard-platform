[build]
  base = "frontend"
  command = "npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy API ke Elastic Beanstalk (HARUS sebelum /* redirect)
[[redirects]]
  from = "/api/*"
  to = "http://Mediguard-platform-env.eba-hiri3bbd.eu-central-1.elasticbeanstalk.com/api/:splat"
  status = 200
  force = true

# SPA fallback (HARUS paling bawah)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
